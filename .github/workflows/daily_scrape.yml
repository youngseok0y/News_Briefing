name: Daily News Scrape & Upload

on:
  schedule:
    # 한국 시간(KST) 오전 10시 = UTC 오전 1시
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Google Auth
      run: |
        echo "${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}" > client_secret.json
        # token.pickle은 이진 파일이므로 Base64로 환경변수에 저장했다가 복원
        echo "${{ secrets.GOOGLE_TOKEN_PICKLE_BASE64 }}" | base64 -d > token.pickle

    - name: Run automation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        GOOGLE_TOKEN_PICKLE_BASE64: ${{ secrets.GOOGLE_TOKEN_PICKLE_BASE64 }}
        GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
      run: python automate.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 서버의 최신 상태정보만 가져오기
        git fetch origin main
        
        # 2. 로컬 브랜치를 서버의 최신 위치로 '소프트 리셋' (생성된 리포트 파일들은 그대로 유지됨)
        git reset --soft origin/main
        
        # 3. 새로 생성된 리포트들을 스테이징 (-f 옵션으로 .gitignore 무시)
        git add -f daily/*.json daily/*.txt
        
        # 4. 서버 최신 상태 위에 새로운 커밋 생성
        git commit -m "Add daily news reports: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        
        # 5. 그대로 푸시 (이미 서버 최신 상태 위라 충돌이 거의 발생하지 않음)
        git push origin main
