name: Daily News Scrape & Upload (일간 수집)

on:
  schedule:
    # KST 오전 10시 = UTC 오전 01시
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 3.9는 google 라이브러리들의 FutureWarning 대상

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Automation
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_PICKLE_BASE64: ${{ secrets.GOOGLE_TOKEN_PICKLE_BASE64 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NON_INTERACTIVE: "true" # OAuth 브라우저 팝업 방지
        run: |
          cd News_Briefing
          python automate.py
